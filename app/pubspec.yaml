name: smart_car_remote
description: 智能蓝牙摄像头小车遥控 App
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  # flutter_rust_bridge 集成：Dart<->Rust 胶水代码由 codegen 生成（与 Cargo.toml =2.12.0 对齐）
  flutter_rust_bridge: =2.12.0
  # BLE 扫描 / 连接 / GATT 读写
  flutter_reactive_ble: ^5.3.1
  # 加速度计（手机体感操控）
  sensors_plus: ^5.0.1
  # 状态管理
  flutter_riverpod: ^2.5.1
  # 轻量 KV 存储
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
