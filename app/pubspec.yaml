name: smart_car_remote
description: 智能蓝牙摄像头小车遥控 App
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  # flutter_rust_bridge 集成：Dart<->Rust 胶水代码由 codegen 生成（与 Cargo.toml =2.12.0 对齐）。
  # 注意：Dart 版本约束不使用 '=' 前缀，精确版本直接写 "2.12.0"。
  flutter_rust_bridge: 2.12.0
  # BLE 扫描 / 连接 / GATT 读写（支持 Android / iOS / Linux / macOS / Windows）
  flutter_blue_plus: ^2.3.10
  # 加速度计（手机体感操控）
  sensors_plus: ^5.0.1
  # 状态管理
  flutter_riverpod: ^2.5.1
  # 轻量 KV 存储
  shared_preferences: ^2.2.3
  # freezed 运行时注解（frb v2 生成代码依赖）
  freezed_annotation: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # freezed 代码生成（frb v2 生成代码需要）
  freezed: ^2.5.7
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
