; PlatformIO 工程配置 - 智能蓝牙摄像头小车 (ESP32-S3 WROOM)
; 详见 spec: .trae/specs/smart-bt-camera-car/spec.md

[platformio]
default_envs = esp32s3

; ------------------------------------------------------------------
; 本地开发与烧录环境
; ------------------------------------------------------------------
[env:esp32s3]
platform    = espressif32
board       = esp32-s3-devkitc-1
framework   = arduino

; 启用 PSRAM (OPI)
board_build.arduino.memory_type = qio_opi
; 自定义分区表（参考 Freenove 官方）
board_build.partitions = partitions.csv

monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -DBOARD_HAS_PSRAM
    -DCAMERA_MODEL_ESP32S3_EYE
    -O2

lib_deps =
    ; 板载 OV2640 摄像头驱动
    espressif/esp32-camera
    ; 注：ESP32 BLE Arduino 已内置于 Arduino-ESP32 BSP，无需额外声明

; ------------------------------------------------------------------
; CI 环境：仅编译，不触发 upload（pio run -e esp32s3-ci）
; ------------------------------------------------------------------
[env:esp32s3-ci]
extends = env:esp32s3
