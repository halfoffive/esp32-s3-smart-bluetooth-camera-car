# App Build - Flutter + Rust 跨端 App CI 流水线
# 详见 spec: .trae/specs/smart-bt-camera-car/spec.md
#
# 流水线职责：
# 1. cargo doc 生成 Rust 子 crate 文档（独立 job，先跑）
# 2. 矩阵构建 Android APK + Linux/Windows/macOS 桌面包
# 3. tag 推送时聚合各 artifact 创建 GitHub Release
#
# 构建说明见 app/README.md

name: App Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
    paths:
      - 'app/**'
      - '.github/workflows/app.yml'
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/app.yml'
  workflow_dispatch:

jobs:
  # Job 1: Rust 文档生成（无业务依赖，快速暴露接口问题）
  cargo-doc:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出仓库代码
      - name: Checkout
        uses: actions/checkout@v7.0.0

      # 2. 配置 Flutter stable 通道（生成绑定需要）
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 3. 配置 Rust stable 工具链
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # 4. 安装 flutter_rust_bridge_codegen（cargo 官方推荐安装方式）
      # app/rust/src/frb_generated.rs 与 app/lib/src/rust/ 均为 gitignored，
      # 必须在 CI 中重新生成，否则 lib.rs 的 `mod frb_generated;` 会导致 E0583。
      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen

      # 5. 预装 cargo-expand（flutter_rust_bridge_codegen generate 的传递依赖），
      #    提前装好可让 generate 步骤跳过传递编译/下载，显著加速 codegen。
      - name: Install cargo-expand
        run: cargo install cargo-expand

      # 6. 清理平台目录，避免残留文件导致 flutter create . 识别为已有目录而跳过生成
      - name: Clean platform directories
        shell: bash
        run: rm -rf app/android app/ios app/linux app/macos app/windows

      # 7. 补全 Flutter 平台原生目录（已存在则无副作用，不覆盖 lib/ 与 pubspec.yaml）
      - name: Bootstrap Flutter platforms
        working-directory: app
        shell: bash
        run: flutter create . --platforms=android,linux,windows,macos --org com.smartcar

      # 8. 生成 Rust ↔ Dart 绑定代码（产出 frb_generated.rs）
      - name: Generate flutter_rust_bridge bindings
        working-directory: app
        shell: bash
        run: flutter_rust_bridge_codegen generate

      # 9. 生成 Rust 子 crate 文档（不编译依赖、开启全部 feature，要求无警告）
      - name: Generate cargo doc
        working-directory: app/rust
        shell: bash
        run: cargo doc --no-deps --all-features

      # 10. 上传文档产物
      - name: Upload cargo doc
        uses: actions/upload-artifact@v7.0.1
        with:
          name: cargo-doc
          path: app/rust/target/doc

  # Job 2: 跨平台构建矩阵（Android APK + Linux/Windows/macOS 桌面）
  build-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            flutter_target: apk
            rust_target: aarch64-linux-android
          - os: ubuntu-latest
            flutter_target: linux
            rust_target: x86_64-unknown-linux-gnu
          - os: windows-latest
            flutter_target: windows
            rust_target: x86_64-pc-windows-msvc
          - os: macos-latest
            flutter_target: macos
            rust_target: aarch64-apple-darwin

    steps:
      # 1. 检出仓库代码
      - name: Checkout
        uses: actions/checkout@v7.0.0

      # 2. 配置 Flutter stable 通道
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 3. 配置 Rust stable 工具链
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # 4. 安装 flutter_rust_bridge_codegen（cargo 官方推荐安装方式）
      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen

      # 5. 预装 cargo-expand（flutter_rust_bridge_codegen generate 的传递依赖），
      #    提前装好可让 generate 步骤跳过传递编译/下载，显著加速 codegen。
      - name: Install cargo-expand
        run: cargo install cargo-expand

      # 6. 清理平台目录，避免残留文件导致 flutter create . 识别为已有目录而跳过生成
      - name: Clean platform directories
        shell: bash
        run: rm -rf app/android app/ios app/linux app/macos app/windows

      # 7. 补全 Flutter 平台原生目录（仅生成本条目需要的平台，避免跨平台模板问题）
      - name: Bootstrap Flutter platforms
        working-directory: app
        shell: bash
        run: flutter create . --platforms=${{ matrix.flutter_target == 'apk' && 'android' || matrix.flutter_target }} --org com.smartcar

      # 8. 列出已生成的平台目录，便于 CI 日志排查
      - name: List generated platform directory
        if: matrix.flutter_target != 'apk'
        working-directory: app
        shell: bash
        run: ls -la ${{ matrix.flutter_target }} || true

      # 9. 诊断 Android 项目文件是否存在
      - name: List Android project files
        if: matrix.flutter_target == 'apk'
        working-directory: app
        shell: bash
        run: ls -la android/app/build.gradle* android/build.gradle*

      # 10. patch Android compileSdk 至 35（仅 Android 构建需要）：flutter_reactive_ble 依赖 AndroidX 1.7.x
      #      要求 compileSdk ≥ 34；android/ 由 flutter create 生成、不在版本控制中，须在 CI 内 patch
      - name: Patch Android compileSdk
        if: matrix.flutter_target == 'apk'
        working-directory: app
        shell: bash
        run: |
          # 自动检测 app/build.gradle 或 app/build.gradle.kts
          if [ -f android/app/build.gradle ]; then
            APP_GRADLE=android/app/build.gradle
          elif [ -f android/app/build.gradle.kts ]; then
            APP_GRADLE=android/app/build.gradle.kts
          else
            echo "ERROR: no build.gradle or build.gradle.kts found in android/app/"
            exit 1
          fi
          # 自动检测根 build.gradle 或 build.gradle.kts
          if [ -f android/build.gradle ]; then
            ROOT_GRADLE=android/build.gradle
          elif [ -f android/build.gradle.kts ]; then
            ROOT_GRADLE=android/build.gradle.kts
          else
            echo "ERROR: no build.gradle or build.gradle.kts found in android/"
            exit 1
          fi
          echo "Patching $APP_GRADLE and $ROOT_GRADLE"
          sed -i 's/compileSdk = [0-9]*/compileSdk = 35/' "$APP_GRADLE"
          # 在根 build 文件注入 subprojects 块，强制所有插件模块（含 reactive_ble_mobile）compileSdk 35
          cat >> "$ROOT_GRADLE" <<'EOF'

          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty("android")) {
                      project.android {
                          compileSdk 35
                      }
                  }
              }
          }
          EOF

      # 11. 生成 Rust ↔ Dart 绑定代码
      - name: Generate flutter_rust_bridge bindings
        working-directory: app
        shell: bash
        run: flutter_rust_bridge_codegen generate

      # 12. 安装 Linux 桌面构建依赖（仅 linux 桌面构建需要）
      - name: Install Linux desktop dependencies
        if: matrix.flutter_target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake

      # 13. 添加 Rust 交叉编译目标（按矩阵条目）
      - name: Add Rust target
        run: rustup target add ${{ matrix.rust_target }}

      # 14. 拉取 Dart 依赖
      - name: Flutter pub get
        working-directory: app
        shell: bash
        run: flutter pub get

      # 15. 按平台分支构建 release 产物
      - name: Build Android APK
        if: matrix.flutter_target == 'apk'
        working-directory: app
        shell: bash
        run: flutter build apk --release

      - name: Build Linux desktop
        if: matrix.flutter_target == 'linux'
        working-directory: app
        shell: bash
        run: flutter build linux --release

      - name: Build Windows desktop
        if: matrix.flutter_target == 'windows'
        working-directory: app
        shell: bash
        run: flutter build windows --release

      - name: Build macOS desktop
        if: matrix.flutter_target == 'macos'
        working-directory: app
        shell: bash
        run: flutter build macos --release

      # 16. 上传构建产物（按平台区分命名）
      - name: Upload Android artifact
        if: matrix.flutter_target == 'apk'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-android
          path: app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Linux artifact
        if: matrix.flutter_target == 'linux'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-linux
          path: app/build/linux/x64/release/bundle/*

      - name: Upload Windows artifact
        if: matrix.flutter_target == 'windows'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-windows
          path: app/build/windows/x64/runner/Release/*

      - name: Upload macOS artifact
        if: matrix.flutter_target == 'macos'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-macos
          path: app/build/macos/Build/Products/Release/*.app

  # Job 3: tag 推送时聚合各 artifact 创建 GitHub Release（与 firmware.yml 风格一致）
  release:
    needs: build-matrix
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      # 下载所有构建产物到 artifacts/ 目录（每个 artifact 一个子目录）
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      # 创建 Release 并附带各平台二进制
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/app-android/*
            artifacts/app-linux/*
            artifacts/app-windows/*
            artifacts/app-macos/*
