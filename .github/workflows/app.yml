# App Build - Flutter + Rust 跨端 App CI 流水线
# 详见 spec: .trae/specs/smart-bt-camera-car/spec.md
#
# 流水线职责：
# 1. cargo doc 生成 Rust 子 crate 文档（独立 job，先跑）
# 2. 矩阵构建 Android APK + Linux/Windows/macOS 桌面包
# 3. tag 推送时聚合各 artifact 创建 GitHub Release
#
# 构建说明见 app/README.md

name: App Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
    paths:
      - 'app/**'
      - '.github/workflows/app.yml'
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/app.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  # Job 1: Rust 文档生成（无业务依赖，快速暴露接口问题）
  cargo-doc:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # 1. 检出仓库代码
      - name: Checkout
        uses: actions/checkout@v7

      # 2. 配置 Flutter stable 通道（生成绑定需要）
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 3. 配置 Rust stable 工具链
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # 4. cargo 缓存：避免每次从零编译 frb codegen 与 Rust 依赖
      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/rust/target
          key: cargo-${{ runner.os }}-${{ hashFiles('app/rust/Cargo.lock', 'app/rust/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      # 5. 预装 cargo-expand，frb v2.12.0 codegen 依赖它解析 Rust 宏
      - name: Install cargo-expand
        run: cargo install cargo-expand --version 1.0.88 --locked

      # 6. 安装 flutter_rust_bridge_codegen（cargo 官方推荐安装方式）
      # app/rust/src/frb_generated.rs 与 app/lib/src/rust/ 均为 gitignored，
      # 必须在 CI 中重新生成，否则 lib.rs 的 `mod frb_generated;` 会导致 E0583。
      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 2.12.0 --locked

      # 7. 清理平台目录，避免残留文件导致 flutter create . 识别为已有目录而跳过生成
      - name: Clean platform directories
        run: rm -rf app/android app/ios app/linux app/macos app/windows
        shell: bash

      # 8. 补全 Flutter 平台原生目录（已存在则无副作用，不覆盖 lib/ 与 pubspec.yaml）
      - name: Bootstrap Flutter platforms
        run: cd app && flutter create . --platforms=android,linux,windows,macos --org com.smartcar --project-name smart_car_remote

      # 9. 生成 Rust ↔ Dart 绑定代码（产出 frb_generated.rs）
      - name: Generate flutter_rust_bridge bindings
        run: cd app && flutter_rust_bridge_codegen generate

      # 9.5. clippy 零警告门槛：任何 clippy 警告即构建失败
      - name: Run cargo clippy
        run: cd app/rust && cargo clippy --all-features -- -D warnings

      # 10. 生成 Rust 子 crate 文档（不编译依赖、开启全部 feature，要求无警告）
      - name: Generate cargo doc
        run: cd app/rust && cargo doc --no-deps --all-features

      # 11. 上传文档产物
      - name: Upload cargo doc
        uses: actions/upload-artifact@v7
        with:
          name: cargo-doc
          path: app/rust/target/doc

  # Job 2: 跨平台构建矩阵（Android APK + Linux/Windows/macOS 桌面）
  build-matrix:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            flutter_target: apk
            rust_target: aarch64-linux-android
          - os: ubuntu-latest
            flutter_target: linux
            rust_target: x86_64-unknown-linux-gnu
          - os: windows-latest
            flutter_target: windows
            rust_target: x86_64-pc-windows-msvc
          - os: macos-latest
            flutter_target: macos
            rust_target: aarch64-apple-darwin

    steps:
      # 1. 检出仓库代码
      - name: Checkout
        uses: actions/checkout@v7

      # 2. 配置 Flutter stable 通道
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 3. 配置 Rust stable 工具链
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # 4. cargo 缓存：避免每次从零编译 frb codegen 与 Rust 依赖
      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/rust/target
          key: cargo-${{ runner.os }}-${{ hashFiles('app/rust/Cargo.lock', 'app/rust/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      # 5. 预装 cargo-expand，frb v2.12.0 codegen 依赖它解析 Rust 宏
      - name: Install cargo-expand
        run: cargo install cargo-expand --version 1.0.88 --locked

      # 6. 安装 flutter_rust_bridge_codegen（cargo 官方推荐安装方式）
      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 2.12.0 --locked

      # 7. 清理平台目录，避免残留文件导致 flutter create . 识别为已有目录而跳过生成
      - name: Clean platform directories
        run: rm -rf app/android app/ios app/linux app/macos app/windows
        shell: bash

      # 8. 补全 Flutter 平台原生目录（已存在则无副作用，不覆盖 lib/ 与 pubspec.yaml）
      - name: Bootstrap Flutter platforms
        run: cd app && flutter create . --platforms=android,linux,windows,macos --org com.smartcar --project-name smart_car_remote

      # 9. patch Android compileSdk 至 35（仅 Android 构建需要）：flutter_reactive_ble 依赖 AndroidX 1.7.x
      #      要求 compileSdk ≥ 34；android/ 由 flutter create 生成、不在版本控制中，须在 CI 内 patch
      - name: Patch Android compileSdk
        if: matrix.flutter_target == 'apk'
        shell: bash
        run: |
          # DSL-aware patch：Kotlin DSL (.gradle.kts) 必须用 `compileSdk = 35`（属性赋值，带 `=`）；
          # Groovy DSL (.gradle) 必须用 `compileSdk 35`（函数调用风格，不带 `=`）。
          # 旧实现用单一 sed 同时处理两种文件，会生成非法的 `compileSdk 35`（Kotlin DSL 缺 `=`）。

          # 1) patch app/android/app/build.gradle(.kts) compileSdk -> 35，按扩展名分流
          for f in app/android/app/build.gradle app/android/app/build.gradle.kts; do
            if [ -f "$f" ]; then
              case "$f" in
                *.gradle.kts)
                  # Kotlin DSL: 必须保留 `=`
                  sed -i -E 's/compileSdk[[:space:]]*=[[:space:]]*[0-9]+/compileSdk = 35/g; s/compileSdk[[:space:]]*=[[:space:]]*flutter\.compileSdkVersion/compileSdk = 35/g' "$f"
                  ;;
                *.gradle)
                  # Groovy DSL: 不带 `=`
                  sed -i -E 's/compileSdk[[:space:]]+[0-9]+/compileSdk 35/g; s/compileSdk[[:space:]]+flutter\.compileSdkVersion/compileSdk 35/g; s/compileSdkVersion[[:space:]]+flutter\.compileSdkVersion/compileSdkVersion 35/g' "$f"
                  ;;
              esac
            fi
          done

          # 2) 在根 build.gradle(.kts) 第一个已有的 subprojects 块内注入 afterEvaluate，
          #    强制所有插件模块 compileSdk 35。直接 append 新的 subprojects 块会触发 Gradle
          #    "Cannot run Project.afterEvaluate(Action) when the project is already evaluated"。
          ROOT_GRADLE=""
          for f in app/android/build.gradle app/android/build.gradle.kts; do
            if [ -f "$f" ]; then ROOT_GRADLE="$f"; break; fi
          done
          if [ -n "$ROOT_GRADLE" ]; then
            python3 - "$ROOT_GRADLE" <<'PY'
          import sys, re
          path = sys.argv[1]
          with open(path, 'r', encoding='utf-8') as f:
              text = f.read()
          if path.endswith('.kts'):
              block = '''    afterEvaluate {
                  if (hasProperty("android")) {
                      extensions.findByName("android")?.let { ext ->
                          try {
                              ext::class.java.getMethod("setCompileSdk", Int::class.javaPrimitiveType).invoke(ext, 35)
                          } catch (_: Throwable) {
                              try {
                                  ext::class.java.getMethod("setCompileSdkVersion", Int::class.javaPrimitiveType).invoke(ext, 35)
                              } catch (_: Throwable) {
                              }
                          }
                      }
                  }
              }
          '''
          else:
              block = '''    afterEvaluate { project ->
                  if (project.hasProperty("android")) {
                      project.android {
                          compileSdk 35
                      }
                  }
              }
          '''
          pattern = re.compile(r'^(subprojects\s*\{)\s*$', re.MULTILINE)
          def repl(m, block=block):
              return m.group(1) + '\n' + block
          new_text, count = pattern.subn(repl, text, count=1)
          if count == 0:
              # 没有现有 subprojects 块则追加
              new_text = text.rstrip() + '\n\n' + block.strip() + '\n'
          with open(path, 'w', encoding='utf-8') as f:
              f.write(new_text)
          PY
          fi

      # 10. 生成 Rust ↔ Dart 绑定代码
      - name: Generate flutter_rust_bridge bindings
        run: cd app && flutter_rust_bridge_codegen generate

      # 10.5. clippy 零警告门槛：任何 clippy 警告即构建失败（所有矩阵条目均执行，clippy 轻量且仅涉及 Rust 侧）
      - name: Run cargo clippy
        run: cd app/rust && cargo clippy --all-features -- -D warnings

      # 11. 安装 Linux 桌面构建依赖（仅 ubuntu runner 需要，apk/linux 共用）
      - name: Install Linux desktop dependencies
        if: matrix.flutter_target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake

      # 12. 添加 Rust 交叉编译目标（按矩阵条目）
      - name: Add Rust target
        run: rustup target add ${{ matrix.rust_target }}

      # 13. 拉取 Dart 依赖
      - name: Flutter pub get
        run: cd app && flutter pub get

      # 14. 按平台分支构建 release 产物
      - name: Build Android APK
        if: matrix.flutter_target == 'apk'
        run: cd app && flutter build apk --release

      - name: Build Linux desktop
        if: matrix.flutter_target == 'linux'
        run: cd app && flutter build linux --release

      - name: Build Windows desktop
        if: matrix.flutter_target == 'windows'
        run: cd app && flutter build windows --release

      - name: Build macOS desktop
        if: matrix.flutter_target == 'macos'
        run: cd app && flutter build macos --release

      # 15. 上传构建产物（按平台区分命名）
      - name: Upload Android artifact
        if: matrix.flutter_target == 'apk'
        uses: actions/upload-artifact@v7
        with:
          name: app-android
          path: app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Linux artifact
        if: matrix.flutter_target == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: app-linux
          path: app/build/linux/x64/release/bundle/*

      - name: Upload Windows artifact
        if: matrix.flutter_target == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: app-windows
          path: app/build/windows/x64/runner/Release/*

      - name: Upload macOS artifact
        if: matrix.flutter_target == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: app-macos
          path: app/build/macos/Build/Products/Release/*.app

  # Job 3: HarmonyOS HAP 构建（实验性，使用 flutter_flutter SDK fork）
  # 工具链不确定性高（OpenHarmony SDK URL / hvigor 包名 / ohos 平台目录），
  # 用 continue-on-error: true 标注，失败不阻塞 release（needs 中仍视为 success）。
  # 仅手动触发（workflow_dispatch），不进入 push/PR 自动构建流水线。
  build-hap:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    continue-on-error: true
    steps:
      # 1. 检出仓库代码
      - name: Checkout
        uses: actions/checkout@v7

      # 2. JDK 17 是 OpenHarmony hvigor 强制要求
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3. Clone flutter_flutter SDK fork（OpenHarmony 适配版，提供 flutter build hap 命令）
      - name: Clone flutter_flutter SDK
        run: |
          git clone --depth 1 https://gitcode.com/CPF-Flutter/flutter_flutter "$HOME/flutter_ohos"
          echo "$HOME/flutter_ohos/bin" >> "$GITHUB_PATH"

      # 4. 修复 fork 的 Flutter SDK 版本号占位
      #    gitcode fork 用 `git describe --tags` 推导版本，--depth 1 克隆无 tag → 回退常量
      #    `0.0.0-unknown`，且 bootstrap 会把 0.0.0-unknown 写回 version 文件并新建
      #    bin/cache/flutter.version.json。因此必须**先 bootstrap 再 patch 缓存**，
      #    先写 version 文件无效（会被 bootstrap 覆盖）。
      - name: Fix Flutter SDK version for fork
        run: |
          FLUTTER_VERSION="3.27.4"
          # 1) 触发 bootstrap（创建 bin/cache/flutter.version.json，内容为 0.0.0-unknown）
          flutter --version >/dev/null 2>&1 || true
          # 2) bootstrap 后 patch 缓存里的 0.0.0-unknown → 真实版本号
          #    后续命令因缓存存在且 !fetchTags 直接读缓存，不会再次覆盖
          if [ -f "$HOME/flutter_ohos/bin/cache/flutter.version.json" ]; then
            sed -i "s/0\.0\.0-unknown/$FLUTTER_VERSION/g" "$HOME/flutter_ohos/bin/cache/flutter.version.json"
          fi
          echo "$FLUTTER_VERSION" > "$HOME/flutter_ohos/version"
          echo "Patched flutter version to $FLUTTER_VERSION"

      # 5. 下载 OpenHarmony SDK（公开下载地址：huaweicloud openharmony 镜像）
      #    fork 的 OhosSdk 校验逻辑（ohos_sdk.dart）：
      #    1. initSdkVersionMap 扫描 OHOS_SDK_HOME 下纯数字命名的子目录
      #    2. _getHdcPath 在 <sdkPath>/<数字>/toolchains/hdc 查找 hdc 可执行文件
      #    3. 必须先解压外层 .tar.gz，再解压内层 linux/*.zip，最后重组为数字目录结构
      - name: Download OpenHarmony SDK
        run: |
          mkdir -p "$HOME/ohos-sdk"
          # 尝试 OpenHarmony SDK 官方公开镜像（华为云）
          for SDK_URL in \
            "https://repo.huaweicloud.com/openharmony/os/5.0.0-Release/ohos-sdk-windows_linux-public.tar.gz" \
            "https://repo.huaweicloud.com/openharmony/os/4.0-Release/ohos-sdk-windows_linux-public.tar.gz"; do
            echo "Trying: $SDK_URL"
            if curl -fSL -o /tmp/ohos-sdk.tar.gz "$SDK_URL" 2>&1; then
              echo "Downloaded from: $SDK_URL"
              # 5.0.0-Release = API 12, 4.0-Release = API 10
              case "$SDK_URL" in
                *5.0.0-Release*) API_VERSION=12 ;;
                *4.0-Release*)   API_VERSION=10 ;;
                *)               API_VERSION=12 ;;
              esac
              break
            fi
          done
          if [ -f /tmp/ohos-sdk.tar.gz ]; then
            # 1) 解压外层 .tar.gz → ohos-sdk/{linux,windows}/*.zip
            mkdir -p /tmp/ohos-sdk-extract
            tar -xzf /tmp/ohos-sdk.tar.gz -C /tmp/ohos-sdk-extract
            # 2) 解压内层 linux/*.zip → {ets,js,native,previewer,toolchains}/
            if [ -d /tmp/ohos-sdk-extract/ohos-sdk/linux ]; then
              cd /tmp/ohos-sdk-extract/ohos-sdk/linux
              for f in *.zip; do unzip -o "$f" >/dev/null 2>&1; done
              # 3) 重组为 OHOS_SDK_HOME/<API_VERSION>/toolchains/hdc 结构
              mkdir -p "$HOME/ohos-sdk/$API_VERSION"
              cp -r /tmp/ohos-sdk-extract/ohos-sdk/linux/* "$HOME/ohos-sdk/$API_VERSION/"
              echo "SDK structure:"
              find "$HOME/ohos-sdk" -name hdc -type f 2>/dev/null
            fi
            # OhosSdk 优先检查 OHOS_HOME，其次 OHOS_SDK_HOME
            echo "OHOS_HOME=$HOME/ohos-sdk" >> "$GITHUB_ENV"
            echo "OHOS_SDK_HOME=$HOME/ohos-sdk" >> "$GITHUB_ENV"
            echo "HOS_SDK_HOME=$HOME/ohos-sdk" >> "$GITHUB_ENV"
            echo "DEVECO_SDK_HOME=$HOME/ohos-sdk" >> "$GITHUB_ENV"
          else
            echo "WARNING: OpenHarmony SDK 下载失败，后续 flutter create 可能报 No Hmos SDK found"
          fi

      # 6. 安装 hvigor / ohpm（npm 全局，使用华为 OpenHarmony registry）
      #    提前安装，避免 flutter build hap 时找不到 hvigor。
      - name: Install hvigor and ohpm
        run: |
          npm config set @ohos:registry https://repo.harmonyos.com/npm/
          # hvigor 与 ohpm 的精确包名以 OpenHarmony 文档为准；包名不一致时由 continue-on-error 兜底
          npm install -g @ohos/hvigor @ohos/ohpm 2>&1 || true

      # 7. 配置 Rust stable 工具链 + cargo 缓存
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/rust/target
          key: cargo-${{ runner.os }}-hap-${{ hashFiles('app/rust/Cargo.lock', 'app/rust/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      # 8. 预装 cargo-expand + flutter_rust_bridge_codegen
      - name: Install cargo-expand
        run: cargo install cargo-expand --version 1.0.88 --locked

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 2.12.0 --locked

      # 9. 验证 flutter_flutter SDK 可用（打印版本，检测 ohos 支持）
      - name: Verify flutter_flutter SDK
        run: |
          flutter --version
          flutter doctor || true

      # 10. 清理平台目录后生成 ohos 平台目录（flutter_flutter fork 支持 --platforms=ohos）
      - name: Bootstrap ohos platform
        run: |
          rm -rf app/android app/ios app/linux app/macos app/windows app/ohos
          cd app && flutter create . --platforms=ohos --org com.smartcar --project-name smart_car_remote

      # 11. 生成 frb bindings + 拉取依赖
      - name: Generate flutter_rust_bridge bindings
        run: cd app && flutter_rust_bridge_codegen generate

      - name: Flutter pub get
        run: cd app && flutter pub get

      # 12. 添加 OpenHarmony Rust target（可能不在 rustup 官方收录，失败则 fallback android target）
      - name: Add Rust target for ohos
        run: |
          # 优先尝试 OpenHarmony arm64 target；rustup 未收录则 fallback 到 android arm64
          rustup target add aarch64-unknown-linux-ohos 2>/dev/null || \
            rustup target add aarch64-linux-android

      # 13. 构建 unsigned HAP（签名需华为开发者证书，留后续 spec 扩展）
      - name: Build HarmonyOS HAP
        run: cd app && flutter build hap --release

      # 14. 上传 HAP 产物（优先常见 hvigor 产物路径，glob 兜底）
      - name: Upload HAP artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: app-hap
          path: |
            app/ohos/entry/build/default/outputs/default/*.hap
            app/build/ohos/**/*.hap
            app/build/**/*.hap
            app/ohos/**/*.hap
            **/*.hap
          if-no-files-found: warn

  # Job 4: tag 推送时聚合各 artifact 创建 GitHub Release（与 firmware.yml 风格一致）
  release:
    needs: [cargo-doc, build-matrix, build-hap]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 下载所有构建产物到 artifacts/ 目录（每个 artifact 一个子目录）
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: 'app-*'
          path: artifacts

      # 创建 Release 并附带各平台二进制（HAP 在 build-hap 成功时才存在）
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/app-android/*
            artifacts/app-linux/*
            artifacts/app-windows/*
            artifacts/app-macos/*
            artifacts/app-hap/*
