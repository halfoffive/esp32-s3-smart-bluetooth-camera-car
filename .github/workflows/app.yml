# App Build - Flutter + Rust 跨端 App CI 流水线
# 详见 spec: .trae/specs/smart-bt-camera-car/spec.md
#
# 流水线职责：
# 1. cargo doc 生成 Rust 子 crate 文档（独立 job，先跑）
# 2. 矩阵构建 Android APK + Linux/Windows/macOS 桌面包（桌面产物内嵌 rust_lib 动态库）
# 3. tag 推送时聚合各 artifact 创建 GitHub Release
#
# 构建说明见 app/README.md
#
# 注：HarmonyOS HAP 已全面弃用（工具链不稳定 + 拖慢流水线），如需 HAP 构建请手动本地跑。

name: App Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
    paths:
      - 'app/**'
      - '.github/workflows/app.yml'
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/app.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  # Job 1: Rust 文档生成（无业务依赖，快速暴露接口问题）
  cargo-doc:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # 1. 检出仓库代码
      - name: Checkout
        uses: actions/checkout@v7

      # 2. 配置 Flutter stable 通道（生成绑定需要）
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 3. 配置 Rust stable 工具链
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # 4. cargo 缓存：避免每次从零编译 Rust 依赖（cargo-binstall 直接下载预编译二进制，无需缓存）
      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/rust/target
          key: cargo-${{ runner.os }}-${{ hashFiles('app/rust/Cargo.lock', 'app/rust/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      # 5. 安装 cargo-binstall（下载预编译二进制而非源码编译，几秒完成）
      #    通过 taiki-e/install-action 装 binstall 本体，避免 cargo-bins 官方
      #    action 的 PowerShell 自安装脚本在 windows-latest 上 iwr 报
      #    NullReferenceException 的问题。install-action 覆盖三平台。
      - name: Install cargo-binstall
        uses: taiki-e/install-action@v2.9.4
        with:
          tool: cargo-binstall

      # 6. 用 cargo-binstall 拉预编译 cargo-expand 与 flutter_rust_bridge_codegen，取代 cargo install（后者需要现场编译数分钟）
      - name: Install cargo tools (binstall)
        run: |
          cargo binstall -y --force cargo-expand@1.0.88
          cargo binstall -y --force flutter_rust_bridge_codegen@2.12.0

      # 7. 清理平台目录，避免残留文件导致 flutter create . 识别为已有目录而跳过生成
      - name: Clean platform directories
        run: rm -rf app/android app/ios app/linux app/macos app/windows
        shell: bash

      # 8. 补全 Flutter 平台原生目录（已存在则无副作用，不覆盖 lib/ 与 pubspec.yaml）
      - name: Bootstrap Flutter platforms
        run: cd app && flutter create . --platforms=android,linux,windows,macos --org com.smartcar --project-name smart_car_remote

      # 9. 生成 Rust ↔ Dart 绑定代码（产出 frb_generated.rs）
      - name: Generate flutter_rust_bridge bindings
        run: cd app && flutter_rust_bridge_codegen generate

      # 9.5. clippy 零警告门槛：任何 clippy 警告即构建失败
      - name: Run cargo clippy
        run: cd app/rust && cargo clippy --all-features -- -D warnings

      # 10. 生成 Rust 子 crate 文档（不编译依赖、开启全部 feature，要求无警告）
      - name: Generate cargo doc
        run: cd app/rust && cargo doc --no-deps --all-features

      # 11. 上传文档产物
      - name: Upload cargo doc
        uses: actions/upload-artifact@v7
        with:
          name: cargo-doc
          path: app/rust/target/doc

  # Job 2: 跨平台构建矩阵（Android APK + Linux/Windows/macOS 桌面）
  # 桌面平台：Flutter build 完成后额外把 Rust cdylib（rust_lib.dll/.so/.dylib）拷贝到 release bundle，
  #           解决默认打包不包含 Rust 动态库、启动即报 "Failed to load dynamic library 'rust_lib.dll'
  #           (error code: 126)" 的问题。
  build-matrix:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            flutter_target: apk
            rust_target: aarch64-linux-android
          - os: ubuntu-latest
            flutter_target: linux
            rust_target: x86_64-unknown-linux-gnu
          - os: windows-latest
            flutter_target: windows
            rust_target: x86_64-pc-windows-msvc
          - os: macos-latest
            flutter_target: macos
            rust_target: aarch64-apple-darwin

    steps:
      # 1. 检出仓库代码
      - name: Checkout
        uses: actions/checkout@v7

      # 2. 配置 Flutter stable 通道
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 3. 配置 Rust stable 工具链
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # 4. cargo 缓存：避免每次从零编译 Rust 依赖
      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/rust/target
          key: cargo-${{ runner.os }}-${{ hashFiles('app/rust/Cargo.lock', 'app/rust/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      # 5. 安装 cargo-binstall（下载预编译二进制而非源码编译）
      #    通过 taiki-e/install-action 装 binstall 本体，规避 cargo-bins 官方
      #    action 在 windows-latest 上的 PowerShell iwr NullReferenceException。
      - name: Install cargo-binstall
        uses: taiki-e/install-action@v2.9.4
        with:
          tool: cargo-binstall

      # 6. 用 cargo-binstall 拉 cargo-expand + flutter_rust_bridge_codegen
      - name: Install cargo tools (binstall)
        shell: bash
        run: |
          cargo binstall -y --force cargo-expand@1.0.88
          cargo binstall -y --force flutter_rust_bridge_codegen@2.12.0

      # 7. 清理平台目录，避免残留文件导致 flutter create . 识别为已有目录而跳过生成
      - name: Clean platform directories
        run: rm -rf app/android app/ios app/linux app/macos app/windows
        shell: bash

      # 8. 补全 Flutter 平台原生目录（已存在则无副作用，不覆盖 lib/ 与 pubspec.yaml）
      - name: Bootstrap Flutter platforms
        run: cd app && flutter create . --platforms=android,linux,windows,macos --org com.smartcar --project-name smart_car_remote

      # 9. patch Android compileSdk 至 35（仅 Android 构建需要）：flutter_blue_plus 依赖 AndroidX 1.7.x
      #      要求 compileSdk ≥ 34；android/ 由 flutter create 生成、不在版本控制中，须在 CI 内 patch
      - name: Patch Android compileSdk
        if: matrix.flutter_target == 'apk'
        shell: bash
        run: |
          # DSL-aware patch：Kotlin DSL (.gradle.kts) 必须用 `compileSdk = 35`（属性赋值，带 `=`）；
          # Groovy DSL (.gradle) 必须用 `compileSdk 35`（函数调用风格，不带 `=`）。
          # 旧实现用单一 sed 同时处理两种文件，会生成非法的 `compileSdk 35`（Kotlin DSL 缺 `=`）。

          # 1) patch app/android/app/build.gradle(.kts) compileSdk -> 35，按扩展名分流
          for f in app/android/app/build.gradle app/android/app/build.gradle.kts; do
            if [ -f "$f" ]; then
              case "$f" in
                *.gradle.kts)
                  # Kotlin DSL: 必须保留 `=`
                  sed -i -E 's/compileSdk[[:space:]]*=[[:space:]]*[0-9]+/compileSdk = 35/g; s/compileSdk[[:space:]]*=[[:space:]]*flutter\.compileSdkVersion/compileSdk = 35/g' "$f"
                  ;;
                *.gradle)
                  # Groovy DSL: 不带 `=`
                  sed -i -E 's/compileSdk[[:space:]]+[0-9]+/compileSdk 35/g; s/compileSdk[[:space:]]+flutter\.compileSdkVersion/compileSdk 35/g; s/compileSdkVersion[[:space:]]+flutter\.compileSdkVersion/compileSdkVersion 35/g' "$f"
                  ;;
              esac
            fi
          done

          # 2) 在根 build.gradle(.kts) 第一个已有的 subprojects 块内注入 afterEvaluate，
          #    强制所有插件模块 compileSdk 35。直接 append 新的 subprojects 块会触发 Gradle
          #    "Cannot run Project.afterEvaluate(Action) when the project is already evaluated"。
          ROOT_GRADLE=""
          for f in app/android/build.gradle app/android/build.gradle.kts; do
            if [ -f "$f" ]; then ROOT_GRADLE="$f"; break; fi
          done
          if [ -n "$ROOT_GRADLE" ]; then
            python3 - "$ROOT_GRADLE" <<'PY'
          import sys, re
          path = sys.argv[1]
          with open(path, 'r', encoding='utf-8') as f:
              text = f.read()
          if path.endswith('.kts'):
              block = '''    afterEvaluate {
                  if (hasProperty("android")) {
                      extensions.findByName("android")?.let { ext ->
                          try {
                              ext::class.java.getMethod("setCompileSdk", Int::class.javaPrimitiveType).invoke(ext, 35)
                          } catch (_: Throwable) {
                              try {
                                  ext::class.java.getMethod("setCompileSdkVersion", Int::class.javaPrimitiveType).invoke(ext, 35)
                              } catch (_: Throwable) {
                              }
                          }
                      }
                  }
              }
          '''
          else:
              block = '''    afterEvaluate { project ->
                  if (project.hasProperty("android")) {
                      project.android {
                          compileSdk 35
                      }
                  }
              }
          '''
          pattern = re.compile(r'^(subprojects\s*\{)\s*$', re.MULTILINE)
          def repl(m, block=block):
              return m.group(1) + '\n' + block
          new_text, count = pattern.subn(repl, text, count=1)
          if count == 0:
              # 没有现有 subprojects 块则追加
              new_text = text.rstrip() + '\n\n' + block.strip() + '\n'
          with open(path, 'w', encoding='utf-8') as f:
              f.write(new_text)
          PY
          fi

      # 10. 生成 Rust ↔ Dart 绑定代码
      - name: Generate flutter_rust_bridge bindings
        run: cd app && flutter_rust_bridge_codegen generate

      # 10.5. clippy 零警告门槛：任何 clippy 警告即构建失败（所有矩阵条目均执行，clippy 轻量且仅涉及 Rust 侧）
      - name: Run cargo clippy
        run: cd app/rust && cargo clippy --all-features -- -D warnings

      # 11. 安装 Linux 桌面构建依赖（仅 ubuntu runner 需要，apk/linux 共用）
      - name: Install Linux desktop dependencies
        if: matrix.flutter_target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake

      # 12. 添加 Rust 交叉编译目标（按矩阵条目）
      - name: Add Rust target
        run: rustup target add ${{ matrix.rust_target }}

      # 13. 拉取 Dart 依赖
      - name: Flutter pub get
        run: cd app && flutter pub get

      # 14. 按平台分支构建 release 产物
      - name: Build Android APK
        if: matrix.flutter_target == 'apk'
        run: cd app && flutter build apk --release

      - name: Build Linux desktop
        if: matrix.flutter_target == 'linux'
        run: cd app && flutter build linux --release

      - name: Build Windows desktop
        if: matrix.flutter_target == 'windows'
        run: cd app && flutter build windows --release

      - name: Build macOS desktop
        if: matrix.flutter_target == 'macos'
        run: cd app && flutter build macos --release

      # 14.5. 桌面平台：编译 Rust cdylib 并拷贝到 Flutter release bundle
      #       修复 "Failed to load dynamic library 'rust_lib.dll' (error code: 126)"：
      #       Flutter 默认桌面打包不感知外部 Cargo crate，需在 build 之后把
      #       rust_lib.{dll,so,dylib} 放到可执行文件同目录 / macOS Frameworks 目录。
      #       注：Linux 与 macOS 矩阵条目的 rust_target 恰好等于 host，但仍显式带
      #       `--target <triple>` 保持三平台产物路径一致（cargo 会输出到
      #       `target/<triple>/release/`），三个 step 结构完全对称。
      - name: Bundle rust_lib into Linux desktop
        if: matrix.flutter_target == 'linux'
        shell: bash
        run: |
          set -e
          cd app/rust
          cargo build --release --target ${{ matrix.rust_target }}
          cd ../..
          SRC="app/rust/target/${{ matrix.rust_target }}/release/librust_lib.so"
          DEST_DIR="app/build/linux/x64/release/bundle/lib"
          if [ ! -f "$SRC" ]; then
            echo "ERROR: 未找到 Rust cdylib 产物 $SRC"
            find app/rust/target -maxdepth 4 -name 'librust_lib.so' 2>/dev/null || true
            exit 1
          fi
          if [ ! -d "$DEST_DIR" ]; then
            echo "ERROR: 未找到 Flutter Linux bundle 目录 $DEST_DIR"
            find app/build/linux -maxdepth 5 -type d 2>/dev/null || true
            exit 1
          fi
          cp "$SRC" "$DEST_DIR/librust_lib.so"
          ls -al "$DEST_DIR/"

      - name: Bundle rust_lib into Windows desktop
        if: matrix.flutter_target == 'windows'
        shell: bash
        run: |
          set -e
          cd app/rust
          cargo build --release --target ${{ matrix.rust_target }}
          cd ../..
          SRC="app/rust/target/${{ matrix.rust_target }}/release/rust_lib.dll"
          DEST_DIR="app/build/windows/x64/runner/Release"
          if [ ! -f "$SRC" ]; then
            echo "ERROR: 未找到 Rust cdylib 产物 $SRC"
            find app/rust/target -maxdepth 4 -name 'rust_lib.dll' 2>/dev/null || true
            exit 1
          fi
          if [ ! -d "$DEST_DIR" ]; then
            echo "ERROR: 未找到 Flutter Windows Release 目录 $DEST_DIR"
            find app/build/windows -maxdepth 5 -type d 2>/dev/null || true
            exit 1
          fi
          cp "$SRC" "$DEST_DIR/rust_lib.dll"
          ls -al "$DEST_DIR/"

      - name: Bundle rust_lib into macOS desktop
        if: matrix.flutter_target == 'macos'
        shell: bash
        run: |
          set -e
          cd app/rust
          cargo build --release --target ${{ matrix.rust_target }}
          cd ../..
          SRC="app/rust/target/${{ matrix.rust_target }}/release/librust_lib.dylib"
          if [ ! -f "$SRC" ]; then
            echo "ERROR: 未找到 Rust cdylib 产物 $SRC"
            find app/rust/target -maxdepth 4 -name 'librust_lib.dylib' 2>/dev/null || true
            exit 1
          fi
          APP_BUNDLE=$(find app/build/macos/Build/Products/Release -maxdepth 1 -name '*.app' -type d | head -n1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "ERROR: 未找到 macOS .app bundle"
            find app/build/macos -maxdepth 5 -type d 2>/dev/null || true
            exit 1
          fi
          mkdir -p "$APP_BUNDLE/Contents/Frameworks"
          cp "$SRC" "$APP_BUNDLE/Contents/Frameworks/librust_lib.dylib"
          ls -al "$APP_BUNDLE/Contents/Frameworks/"

      # 15. 上传构建产物（按平台区分命名）
      - name: Upload Android artifact
        if: matrix.flutter_target == 'apk'
        uses: actions/upload-artifact@v7
        with:
          name: app-android
          path: app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Linux artifact
        if: matrix.flutter_target == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: app-linux
          path: app/build/linux/x64/release/bundle/*

      - name: Upload Windows artifact
        if: matrix.flutter_target == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: app-windows
          path: app/build/windows/x64/runner/Release/*

      - name: Upload macOS artifact
        if: matrix.flutter_target == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: app-macos
          path: app/build/macos/Build/Products/Release/*.app

  # Job 3: tag 推送时聚合各 artifact 创建 GitHub Release（与 firmware.yml 风格一致）
  release:
    needs: [cargo-doc, build-matrix]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 下载所有构建产物到 artifacts/ 目录（每个 artifact 一个子目录）
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: 'app-*'
          path: artifacts

      # 创建 Release 并附带各平台二进制
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/app-android/*
            artifacts/app-linux/*
            artifacts/app-windows/*
            artifacts/app-macos/*
