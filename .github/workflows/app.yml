# App Build - Flutter + Rust 跨端 App CI 流水线
# 详见 spec: .trae/specs/smart-bt-camera-car/spec.md
#
# 流水线职责：
# 1. cargo doc 生成 Rust 子 crate 文档（独立 job，先跑）
# 2. 矩阵构建 Android APK + Linux/Windows/macOS 桌面包
# 3. tag 推送时聚合各 artifact 创建 GitHub Release
#
# 构建说明见 app/README.md

name: App Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
    paths:
      - 'app/**'
      - '.github/workflows/app.yml'
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/app.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  # Job 1: Rust 文档生成（无业务依赖，快速暴露接口问题）
  cargo-doc:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # 1. 检出仓库代码
      - name: Checkout
        uses: actions/checkout@v7

      # 2. 配置 Flutter stable 通道（生成绑定需要）
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 3. 配置 Rust stable 工具链
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # 4. 安装 cargo-binstall（预编译二进制安装器，加速后续工具链安装）
      - name: Install cargo-binstall
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      # 5. cargo 缓存：避免每次从零编译 frb codegen 与 Rust 依赖
      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/rust/target
          key: cargo-${{ runner.os }}-${{ hashFiles('app/rust/Cargo.lock', 'app/rust/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      # 6. 预装 cargo-expand，frb v2.12.0 codegen 依赖它解析 Rust 宏
      - name: Install cargo-expand
        run: cargo binstall --no-confirm cargo-expand --version 1.0.88

      # 7. 安装 flutter_rust_bridge_codegen（预编译二进制安装，via cargo-binstall）
      # app/rust/src/frb_generated.rs 与 app/lib/src/rust/ 均为 gitignored，
      # 必须在 CI 中重新生成，否则 lib.rs 的 `mod frb_generated;` 会导致 E0583。
      - name: Install flutter_rust_bridge_codegen
        run: cargo binstall --no-confirm flutter_rust_bridge_codegen --version 2.12.0

      # 8. 清理平台目录，避免残留文件导致 flutter create . 识别为已有目录而跳过生成
      - name: Clean platform directories
        run: rm -rf app/android app/ios app/linux app/macos app/windows
        shell: bash

      # 9. 补全 Flutter 平台原生目录（已存在则无副作用，不覆盖 lib/ 与 pubspec.yaml）
      - name: Bootstrap Flutter platforms
        run: cd app && flutter create . --platforms=android,linux,windows,macos --org com.smartcar --project-name smart_car_remote

      # 10. 生成 Rust ↔ Dart 绑定代码（产出 frb_generated.rs）
      - name: Generate flutter_rust_bridge bindings
        run: cd app && flutter_rust_bridge_codegen generate --config flutter_rust_bridge.yaml

      # 10.5. clippy 零警告门槛：任何 clippy 警告即构建失败
      - name: Run cargo clippy
        run: cd app/rust && cargo clippy --all-features -- -D warnings

      # 11. 生成 Rust 子 crate 文档（不编译依赖、开启全部 feature，要求无警告）
      - name: Generate cargo doc
        run: cd app/rust && cargo doc --no-deps --all-features

      # 12. 上传文档产物
      - name: Upload cargo doc
        uses: actions/upload-artifact@v7
        with:
          name: cargo-doc
          path: app/rust/target/doc

  # Job 2: 跨平台构建矩阵（Android APK + Linux/Windows/macOS 桌面）
  build-matrix:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            flutter_target: apk
            rust_target: aarch64-linux-android
          - os: ubuntu-latest
            flutter_target: linux
            rust_target: x86_64-unknown-linux-gnu
          - os: windows-latest
            flutter_target: windows
            rust_target: x86_64-pc-windows-msvc
          - os: macos-latest
            flutter_target: macos
            rust_target: aarch64-apple-darwin

    steps:
      # 1. 检出仓库代码
      - name: Checkout
        uses: actions/checkout@v7

      # 2. 配置 Flutter stable 通道
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 3. 配置 Rust stable 工具链
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # 4. 安装 cargo-binstall（预编译二进制安装器，加速后续工具链安装）
      - name: Install cargo-binstall
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      # 5. cargo 缓存：避免每次从零编译 frb codegen 与 Rust 依赖
      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/rust/target
          key: cargo-${{ runner.os }}-${{ hashFiles('app/rust/Cargo.lock', 'app/rust/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      # 6. 预装 cargo-expand，frb v2.12.0 codegen 依赖它解析 Rust 宏
      - name: Install cargo-expand
        run: cargo binstall --no-confirm cargo-expand --version 1.0.88

      # 7. 安装 flutter_rust_bridge_codegen（预编译二进制安装，via cargo-binstall）
      - name: Install flutter_rust_bridge_codegen
        run: cargo binstall --no-confirm flutter_rust_bridge_codegen --version 2.12.0

      # 5.5 安装 cargo-ndk（Android 交叉编译，仅 apk 条目需要）
      - name: Install cargo-ndk
        if: matrix.flutter_target == 'apk'
        run: cargo binstall --no-confirm cargo-ndk

      # 5.6 配置 Android NDK（cargo-ndk 依赖 NDK sysroot + linker）
      - name: Setup Android NDK
        if: matrix.flutter_target == 'apk'
        run: |
          # ubuntu-latest 通常预装 NDK，优先使用；否则安装
          NDK_DIR=$(ls -d ${ANDROID_HOME}/ndk/*/ 2>/dev/null | head -1 | sed 's:/$::')
          if [ -z "$NDK_DIR" ]; then
            echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" >/dev/null 2>&1
            NDK_DIR="${ANDROID_HOME}/ndk/27.0.12077973"
          fi
          echo "ANDROID_NDK_HOME=${NDK_DIR}" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=${NDK_DIR}" >> $GITHUB_ENV
          echo "Using NDK: ${NDK_DIR}"

      # 7. 清理平台目录，避免残留文件导致 flutter create . 识别为已有目录而跳过生成
      - name: Clean platform directories
        run: rm -rf app/android app/ios app/linux app/macos app/windows
        shell: bash

      # 8. 补全 Flutter 平台原生目录（已存在则无副作用，不覆盖 lib/ 与 pubspec.yaml）
      - name: Bootstrap Flutter platforms
        run: cd app && flutter create . --platforms=android,linux,windows,macos --org com.smartcar --project-name smart_car_remote

      # 9. patch Android compileSdk 至 35（仅 Android 构建需要）：flutter_reactive_ble 依赖 AndroidX 1.7.x
      #      要求 compileSdk ≥ 34；android/ 由 flutter create 生成、不在版本控制中，须在 CI 内 patch
      - name: Patch Android compileSdk
        if: matrix.flutter_target == 'apk'
        shell: bash
        run: |
          # DSL-aware patch：Kotlin DSL (.gradle.kts) 必须用 `compileSdk = 35`（属性赋值，带 `=`）；
          # Groovy DSL (.gradle) 必须用 `compileSdk 35`（函数调用风格，不带 `=`）。
          # 旧实现用单一 sed 同时处理两种文件，会生成非法的 `compileSdk 35`（Kotlin DSL 缺 `=`）。

          # 1) patch app/android/app/build.gradle(.kts) compileSdk -> 35，按扩展名分流
          for f in app/android/app/build.gradle app/android/app/build.gradle.kts; do
            if [ -f "$f" ]; then
              case "$f" in
                *.gradle.kts)
                  # Kotlin DSL: 必须保留 `=`
                  sed -i -E 's/compileSdk[[:space:]]*=[[:space:]]*[0-9]+/compileSdk = 35/g; s/compileSdk[[:space:]]*=[[:space:]]*flutter\.compileSdkVersion/compileSdk = 35/g' "$f"
                  ;;
                *.gradle)
                  # Groovy DSL: 不带 `=`
                  sed -i -E 's/compileSdk[[:space:]]+[0-9]+/compileSdk 35/g; s/compileSdk[[:space:]]+flutter\.compileSdkVersion/compileSdk 35/g; s/compileSdkVersion[[:space:]]+flutter\.compileSdkVersion/compileSdkVersion 35/g' "$f"
                  ;;
              esac
            fi
          done

          # 2) 在根 build.gradle(.kts) 第一个已有的 subprojects 块内注入 afterEvaluate，
          #    强制所有插件模块 compileSdk 35。直接 append 新的 subprojects 块会触发 Gradle
          #    "Cannot run Project.afterEvaluate(Action) when the project is already evaluated"。
          ROOT_GRADLE=""
          for f in app/android/build.gradle app/android/build.gradle.kts; do
            if [ -f "$f" ]; then ROOT_GRADLE="$f"; break; fi
          done
          if [ -n "$ROOT_GRADLE" ]; then
            python3 - "$ROOT_GRADLE" <<'PY'
          import sys, re
          path = sys.argv[1]
          with open(path, 'r', encoding='utf-8') as f:
              text = f.read()
          if path.endswith('.kts'):
              block = '''    afterEvaluate {
                  if (hasProperty("android")) {
                      extensions.findByName("android")?.let { ext ->
                          try {
                              ext::class.java.getMethod("setCompileSdk", Int::class.javaPrimitiveType).invoke(ext, 35)
                          } catch (_: Throwable) {
                              try {
                                  ext::class.java.getMethod("setCompileSdkVersion", Int::class.javaPrimitiveType).invoke(ext, 35)
                              } catch (_: Throwable) {
                              }
                          }
                      }
                  }
              }
          '''
          else:
              block = '''    afterEvaluate { project ->
                  if (project.hasProperty("android")) {
                      project.android {
                          compileSdk 35
                      }
                  }
              }
          '''
          pattern = re.compile(r'^(subprojects\s*\{)\s*$', re.MULTILINE)
          def repl(m, block=block):
              return m.group(1) + '\n' + block
          new_text, count = pattern.subn(repl, text, count=1)
          if count == 0:
              # 没有现有 subprojects 块则追加
              new_text = text.rstrip() + '\n\n' + block.strip() + '\n'
          with open(path, 'w', encoding='utf-8') as f:
              f.write(new_text)
          PY
          fi

      # 10. 生成 Rust ↔ Dart 绑定代码
      - name: Generate flutter_rust_bridge bindings
        run: cd app && flutter_rust_bridge_codegen generate --config flutter_rust_bridge.yaml

      # 10.5. clippy 零警告门槛：任何 clippy 警告即构建失败（所有矩阵条目均执行，clippy 轻量且仅涉及 Rust 侧）
      - name: Run cargo clippy
        run: cd app/rust && cargo clippy --all-features -- -D warnings

      # 11. 安装 Linux 桌面构建依赖（仅 ubuntu runner 需要，apk/linux 共用）
      - name: Install Linux desktop dependencies
        if: matrix.flutter_target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake

      # 12. 添加 Rust 交叉编译目标（按矩阵条目）
      - name: Add Rust target
        run: rustup target add ${{ matrix.rust_target }}

      # 13. 拉取 Dart 依赖
      - name: Flutter pub get
        run: cd app && flutter pub get

      # 13.5 编译 Rust cdylib 并复制到 jniLibs（仅 Android，flutter build apk 前需就位）
      - name: Build Rust library for Android
        if: matrix.flutter_target == 'apk'
        run: cd app/rust && cargo ndk -t arm64-v8a -o ../android/app/src/main/jniLibs build --release

      # 14. 按平台分支构建 release 产物
      - name: Build Android APK
        if: matrix.flutter_target == 'apk'
        run: cd app && flutter build apk --release

      - name: Build Linux desktop
        if: matrix.flutter_target == 'linux'
        run: cd app && flutter build linux --release

      # 14.5 编译 Rust cdylib 并复制到 Linux 产物目录
      - name: Build and copy Rust cdylib (Linux)
        if: matrix.flutter_target == 'linux'
        run: |
          cd app/rust && cargo build --release
          mkdir -p ../build/linux/x64/release/bundle/lib/
          cp target/release/librust_lib.so ../build/linux/x64/release/bundle/lib/

      - name: Build Windows desktop
        if: matrix.flutter_target == 'windows'
        run: cd app && flutter build windows --release

      # 14.5 编译 Rust cdylib 并复制到 Windows 产物目录（frb v2 不自动构建原生库）
      - name: Build and copy Rust cdylib (Windows)
        if: matrix.flutter_target == 'windows'
        shell: bash
        run: |
          cd app/rust && cargo build --release
          cp target/release/rust_lib.dll ../build/windows/x64/runner/Release/

      - name: Build macOS desktop
        if: matrix.flutter_target == 'macos'
        run: cd app && flutter build macos --release

      # 14.5 编译 Rust cdylib 并复制到 macOS .app 包
      - name: Build and copy Rust cdylib (macOS)
        if: matrix.flutter_target == 'macos'
        run: |
          cd app/rust && cargo build --release
          APP_DIR="../build/macos/Build/Products/Release/smart_car_remote.app"
          mkdir -p "$APP_DIR/Contents/Frameworks"
          cp target/release/librust_lib.dylib "$APP_DIR/Contents/Frameworks/"

      # 15. 上传构建产物（按平台区分命名）
      - name: Upload Android artifact
        if: matrix.flutter_target == 'apk'
        uses: actions/upload-artifact@v7
        with:
          name: app-android
          path: app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Linux artifact
        if: matrix.flutter_target == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: app-linux
          path: app/build/linux/x64/release/bundle/*

      - name: Upload Windows artifact
        if: matrix.flutter_target == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: app-windows
          path: app/build/windows/x64/runner/Release/*

      - name: Upload macOS artifact
        if: matrix.flutter_target == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: app-macos
          path: app/build/macos/Build/Products/Release/*.app

  # Job 4: tag 推送时聚合各 artifact 创建 GitHub Release（与 firmware.yml 风格一致）
  release:
    needs: [cargo-doc, build-matrix]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 下载所有构建产物到 artifacts/ 目录（每个 artifact 一个子目录）
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: 'app-*'
          path: artifacts

      # 创建 Release 并附带各平台二进制
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/app-android/*
            artifacts/app-linux/*
            artifacts/app-windows/*
            artifacts/app-macos/*
